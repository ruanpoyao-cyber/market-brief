<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Market Brief</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=IBM+Plex+Mono:wght@400;500;600&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#0f1620;--panel:#18212e;--panel2:#1e2a3a;--line:#2a3645;
    --text:#e8edf3;--muted:#8a97a8;--faint:#5b6878;--brass:#d9a441;
    --up:#3fb37f;--down:#e5484d;
    --mono:"IBM Plex Mono",monospace;--disp:"Space Grotesk","Noto Sans TC",sans-serif;
    --body:"Noto Sans TC","Space Grotesk",sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--ink);color:var(--text);font-family:var(--body);line-height:1.5;
       -webkit-font-smoothing:antialiased;
       background-image:radial-gradient(circle at 85% -8%,rgba(217,164,65,.06),transparent 42%)}
  .wrap{max-width:1040px;margin:0 auto;padding:18px 16px 64px}
  a{color:inherit}
  header{display:flex;flex-wrap:wrap;align-items:center;gap:10px 16px;padding-bottom:14px;border-bottom:1px solid var(--line)}
  .eyebrow{flex-basis:100%;font-family:var(--disp);font-size:11px;letter-spacing:.22em;text-transform:uppercase;color:var(--brass)}
  h1{font-family:var(--disp);font-weight:700;font-size:22px}
  .datenav{margin-left:auto;display:flex;align-items:center;gap:6px}
  .datenav button{background:var(--panel);border:1px solid var(--line);color:var(--text);font-family:var(--mono);font-size:15px;width:30px;height:30px;border-radius:7px;cursor:pointer}
  .datenav button:hover{border-color:var(--brass)}
  .datenav select{background:var(--panel);border:1px solid var(--line);color:var(--text);font-family:var(--mono);font-size:14px;padding:5px 8px;border-radius:7px;cursor:pointer}
  .sub{flex-basis:100%;font-family:var(--mono);font-size:12px;color:var(--muted);margin-top:2px}
  .sub b{color:var(--brass);font-weight:500}
  .sec{margin:28px 0 12px;display:flex;align-items:baseline;gap:10px}
  .sec .no{font-family:var(--mono);font-size:12px;color:var(--brass)}
  .sec h2{font-family:var(--disp);font-size:14px;letter-spacing:.1em;text-transform:uppercase;color:var(--text)}
  .sec .rule{flex:1;height:1px;background:var(--line)}
  .sec .n{font-family:var(--mono);font-size:11px;color:var(--faint)}
  .idx{display:grid;grid-template-columns:repeat(6,1fr);gap:8px}
  .idx .cell{padding:12px;background:var(--panel);border:1px solid var(--line);border-radius:10px;cursor:default}
  .idx .cell:hover{border-color:var(--brass)}
  .idx .k{font-size:12px;color:var(--muted)}
  .idx .v{font-family:var(--mono);font-size:18px;font-weight:600;margin-top:3px}
  .idx .c{font-family:var(--mono);font-size:13px;margin-top:1px}
  .summary{padding:14px 16px;background:var(--panel);border:1px solid var(--line);border-radius:10px;font-size:14px;color:var(--text)}
  .news{margin-top:10px;display:grid;grid-template-columns:1fr 1fr;gap:6px 18px}
  .news a{display:flex;gap:8px;padding:8px 0;border-bottom:1px solid var(--line);text-decoration:none;font-size:13px}
  .news a:hover>span:last-child{text-decoration:underline;color:var(--brass)}
  .news .src{font-family:var(--mono);font-size:10px;color:var(--brass);background:rgba(217,164,65,.1);padding:1px 6px;border-radius:4px;white-space:nowrap;height:fit-content}
  .tbl-wrap{overflow-x:auto;border:1px solid var(--line);border-radius:10px}
  table{border-collapse:collapse;width:100%;font-size:13px}
  th,td{padding:8px 10px;text-align:right;white-space:nowrap;border-bottom:1px solid var(--line)}
  th{font-family:var(--disp);font-size:11px;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);background:var(--panel);position:sticky;top:0}
  td:first-child,th:first-child,.l{text-align:left}
  tr:last-child td{border-bottom:0}
  tbody tr:hover{background:var(--panel)}
  .sym{font-family:var(--disp);font-weight:700;cursor:pointer;border-bottom:1px dotted var(--faint)}
  .sym small{font-family:var(--mono);font-weight:400;color:var(--faint);margin-left:6px;display:inline-block;max-width:150px;white-space:normal;vertical-align:top;line-height:1.25}
  .ana{text-align:left;white-space:normal;min-width:300px;color:var(--muted);font-size:12px}
  .pivot td:first-child,.pivot3 td:first-child{white-space:normal;min-width:96px}
  #t1 td,#t1 th,#t2 td,#t2 th{padding:8px 6px}
  #t1 td:first-child,#t1 th:first-child,#t2 td:first-child,#t2 th:first-child{width:1%;white-space:nowrap;padding-right:3px}
  #t1 td:nth-child(2),#t2 td:nth-child(2){white-space:normal}
  #t1 td:nth-child(3),#t1 th:nth-child(3),#t2 td:nth-child(3),#t2 th:nth-child(3){white-space:normal;max-width:112px}
  .pivot{display:grid;grid-template-columns:1fr 1fr;gap:14px}
  .pivot3{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
  .pivot h3,.pivot3 h3{font-size:12px;color:var(--muted);margin-bottom:6px;font-weight:500}
  .up{color:var(--up)}.down{color:var(--down)}.flat{color:var(--muted)}
  .seg{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px}
  .seg button{background:var(--panel);border:1px solid var(--line);color:var(--muted);font-family:var(--disp);font-size:12px;padding:6px 12px;border-radius:999px;cursor:pointer}
  .seg button.on{color:var(--ink);background:var(--brass);border-color:var(--brass);font-weight:700}
  .streak{display:flex;flex-wrap:wrap;gap:8px}
  .chip{display:flex;align-items:center;gap:8px;padding:8px 12px;background:var(--panel);border:1px solid var(--brass);border-radius:10px;cursor:pointer}
  .chip b{font-family:var(--disp)}
  .chip span{font-family:var(--mono);font-size:11px;color:var(--brass)}
  #tip{position:fixed;z-index:50;display:none;background:#0b1118;border:1px solid var(--brass);border-radius:10px;padding:10px;box-shadow:0 12px 40px rgba(0,0,0,.6);pointer-events:none;width:344px}
  #tip .h{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:6px}
  #tip .h b{font-family:var(--disp);font-size:14px}
  #tip .h .px{font-family:var(--mono);font-size:13px}
  footer{margin-top:34px;padding-top:16px;border-top:1px solid var(--line);font-size:11px;color:var(--faint);line-height:1.7}
  @media(max-width:720px){
    .idx{grid-template-columns:repeat(2,1fr)} .news{grid-template-columns:1fr}
    .pivot,.pivot3{grid-template-columns:1fr} h1{font-size:19px} #tip{width:300px}
  }
</style>
</head>

/* ---------- K 線浮窗 (上價下量, 下方標日期) ---------- */
function candleSVG(oh, dates, title, sub){
  const n=oh.length, W=320,H=204, pP=[6,110], pV=[118,164];
  const lo=Math.min(...oh.map(d=>d[2])), hi=Math.max(...oh.map(d=>d[1]));
  const vmax=Math.max(...oh.map(d=>d[4]));
  const cw=(W-8)/n, bw=Math.max(1.2, cw*0.62);
  const px=i=>4+i*cw+cw/2;
  const py=v=>pP[0]+(hi-v)/((hi-lo)||1)*(pP[1]-pP[0]);
  const vy=v=>pV[1]-(v/(vmax||1))*(pV[1]-pV[0]);
  let s="";
  for(let i=0;i<n;i++){
    const [o,h,l,c,v]=oh[i]; const col=c>=o?"var(--up)":"var(--down)"; const x=px(i);
    s+=`<line x1="${x.toFixed(1)}" y1="${py(h).toFixed(1)}" x2="${x.toFixed(1)}" y2="${py(l).toFixed(1)}" stroke="${col}" stroke-width="0.7"/>`;
    const y1=py(Math.max(o,c)), y2=py(Math.min(o,c));
    s+=`<rect x="${(x-bw/2).toFixed(1)}" y="${y1.toFixed(1)}" width="${bw.toFixed(1)}" height="${Math.max(0.8,y2-y1).toFixed(1)}" fill="${col}"/>`;
    s+=`<rect x="${(x-bw/2).toFixed(1)}" y="${vy(v).toFixed(1)}" width="${bw.toFixed(1)}" height="${(pV[1]-vy(v)).toFixed(1)}" fill="${col}" opacity="0.5"/>`;
  }
  s+=`<line x1="0" y1="${pV[0]-3}" x2="${W}" y2="${pV[0]-3}" stroke="var(--line)" stroke-width="0.5"/>`;
  const ticks=5;
  for(let k=0;k<ticks;k++){
    const i=Math.round(k*(n-1)/(ticks-1)); const x=px(i);
    const anc=k===0?"start":(k===ticks-1?"end":"middle");
    s+=`<text x="${x.toFixed(1)}" y="180" fill="var(--faint)" font-size="9" font-family="var(--mono)" text-anchor="${anc}">${md(dates&&dates[i])}</text>`;
  }
  return `<div class="h"><b>${title}</b><span class="px">${sub}</span></div>
    <svg viewBox="0 0 ${W} ${H}" width="100%">${s}</svg>`;
}
function fgiSpark(hist){
  var pts=(hist||[]).slice(-10).map(function(b){return b[3];});
  if(pts.length<2) return "";
  var W=320,H=56,pad=8,n=pts.length;
  var mn=Math.min.apply(null,pts),mx=Math.max.apply(null,pts),rng=(mx-mn)||1;
  var x=function(i){return pad+i*(W-2*pad-26)/(n-1);};
  var y=function(v){return 10+(1-(v-mn)/rng)*(H-22);};
  var d="",dots="",i;
  for(i=0;i<n;i++){d+=(i===0?"M":"L")+x(i).toFixed(1)+" "+y(pts[i]).toFixed(1);}
  for(i=0;i<n;i++){dots+='<circle cx="'+x(i).toFixed(1)+'" cy="'+y(pts[i]).toFixed(1)+'" r="2" fill="var(--brass)"/>';}
  var first=Math.round(pts[0]),last=Math.round(pts[n-1]);
  var endlbl='<text x="'+(W-22)+'" y="'+(y(pts[n-1])+4).toFixed(1)+'" font-size="12" font-family="var(--disp)" font-weight="700" fill="#f5f7fa">'+last+'</text>';
  return '<div style="font-size:11px;color:var(--faint);font-family:var(--mono);margin:2px 0 0">近 10 日：'+first+' \u2192 '+last+'</div><svg viewBox="0 0 '+W+' '+H+'" width="100%"><path d="'+d+'" fill="none" stroke="var(--brass)" stroke-width="1.6"/>'+dots+endlbl+'</svg>';
}
function fgiGauge(score,rating){
  var W=320,H=190,cx=160,cy=150,R=112,rw=24;
  var bands=[[0,25,"#c0392b"],[25,45,"#e8893b"],[45,55,"#9aa0a6"],[55,75,"#2ecc71"],[75,100,"#1e8449"]];
  var pt=function(f,r){var a=Math.PI*(1-f);return[cx+r*Math.cos(a),cy-r*Math.sin(a)];};
  var arcs="";
  bands.forEach(function(b){var d="",n=16,i,f,q;for(i=0;i<=n;i++){f=(b[0]+(b[1]-b[0])*i/n)/100;q=pt(f,R);d+=(i===0?"M":" L")+q[0].toFixed(1)+" "+q[1].toFixed(1);}arcs+='<path d="'+d+'" fill="none" stroke="'+b[2]+'" stroke-width="'+rw+'" stroke-linecap="butt"/>';});
  var f=Math.max(0,Math.min(100,score))/100, nb=pt(f,R-rw/2-3);
  var needle='<line x1="'+cx+'" y1="'+cy+'" x2="'+nb[0].toFixed(1)+'" y2="'+nb[1].toFixed(1)+'" stroke="#f5f7fa" stroke-width="3" stroke-linecap="round"/>';
  var hub='<circle cx="'+cx+'" cy="'+cy+'" r="23" fill="#0e1a26" stroke="var(--brass)" stroke-width="1.5"/>';
  var num='<text x="'+cx+'" y="'+(cy+10)+'" text-anchor="middle" font-family="var(--disp)" font-size="30" font-weight="700" fill="#f5f7fa">'+Math.round(score)+'</text>';
  var lbl='<text x="6" y="'+(cy+4)+'" font-size="9" fill="var(--faint)" font-family="var(--mono)">極度恐懼</text><text x="'+(W-6)+'" y="'+(cy+4)+'" text-anchor="end" font-size="9" fill="var(--faint)" font-family="var(--mono)">極度貪婪</text>';
  return '<div class="h"><b>CNN 恐懼貪婪指數</b><span class="px">'+rating+'</span></div><svg viewBox="0 0 '+W+' '+H+'" width="100%">'+arcs+lbl+needle+hub+num+'</svg>';
}

function positionTip(e){

function attach(el, fn){

  </header>

  <div class="sec"><span class="no">02</span><h2>四大指數 ＋ VIX</h2><div class="rule"></div><span class="n">游標移上看 K 線</span></div>
  <div class="idx">${R.indices.map(x=>`<div class="cell" data-idx="${x.key}">
      <div class="k">${x.name}</div><div class="v">${num(x.value)}</div>
      <div class="c ${x.rating?fgiCls(x.value):cls(idxChg(x))}">${x.rating?x.rating:pct(idxChg(x))}</div></div>`).join("")}</div>

  <div class="sec"><span class="no">03</span><h2>市場重點新聞摘要</h2><div class="rule"></div></div>
  <div class="summary">${R.news_summary}
    <div class="news">${R.news.map(n=>`<a href="${n.url}" target="_blank" rel="noopener">
      <span class="src">${n.source}</span><span>${n.title}</span></a>`).join("")}</div></div>

  <div class="sec"><span class="no">04</span><h2>樞紐分析 · 漲幅 / 市值增加 / 成交金額</h2><div class="rule"></div></div>
  <div class="pivot3">
    <div><h3>漲幅前 30 · 依族群</h3>${pivotTable(R.pivot_up,"mcap_chg","市值增減(億)",true)}</div>
    <div><h3>市值增加前 30 · 依族群</h3>${pivotTable(R.pivot_up_mcap,"mcap_chg","市值增減(億)",true)}</div>
    <div><h3>成交金額前 30 · 依族群</h3>${pivotTable(R.pivot_turnover,"turnover","成交金額(億)",false)}</div>
  </div>

  <div class="sec"><span class="no">05</span><h2>樞紐分析 · 跌幅 / 市值減少</h2><div class="rule"></div></div>
  <div class="pivot">
    <div><h3>跌幅前 10 · 依族群</h3>${pivotTable(R.pivot_down,"mcap_chg","市值增減(億)",true)}</div>
    <div><h3>市值減少前 10 · 依族群</h3>${pivotTable(R.pivot_down_mcap,"mcap_chg","市值增減(億)",true)}</div>
  </div>

  <div class="sec"><span class="no">06</span><h2>連續三天上榜</h2><div class="rule"></div><span class="n">${streaks.length} 檔</span></div>
  <div class="streak">${streaks.length?streaks.map(s=>`<div class="chip" data-sym="${s.sym}">
      <b>${s.sym}</b><span>${s.tags.join(" · ")}</span></div>`).join("")
      :'<span class="n" style="color:var(--faint)">本期無連續三天上榜標的</span>'}</div>

  <div class="sec"><span class="no">07</span><h2>成交金額 / 漲幅 / 市值增加 ＋ 分析</h2><div class="rule"></div></div>
  <div class="seg">${Object.keys(SEG1).map(k=>`<button data-s1="${k}" class="${seg1===k?'on':''}">${SEG1[k]}</button>`).join("")}</div>
  <div id="t1">${rankTable(R[seg1])}</div>

  <div class="sec"><span class="no">08</span><h2>跌幅 / 市值減少 ＋ 分析</h2><div class="rule"></div></div>
  <div class="seg">${Object.keys(SEG2).map(k=>`<button data-s2="${k}" class="${seg2===k?'on':''}">${SEG2[k]}</button>`).join("")}</div>
  <div id="t2">${rankTable(R[seg2])}</div>

  <footer>漲跌色：${DATA.color_convention==="TW"?"紅漲綠跌（台股慣例）":"綠漲紅跌（國際慣例）"}（可切換）。
    市值增減與成交金額單位為億美元。英文來源新聞標題已翻為繁體中文。
    樣本分析欄於正式版由 AI 依當日中英文新聞生成。資料僅供研究參考，非投資建議。</footer>`;
  $("#prev").onclick=()=>{const i=DATA.dates.indexOf(CUR); if(i<DATA.dates.length-1){CUR=DATA.dates[i+1];render();}};
  $("#next").onclick=()=>{const i=DATA.dates.indexOf(CUR); if(i>0){CUR=DATA.dates[i-1];render();}};
  $("#dsel").onchange=e=>{CUR=e.target.value;render();};
  document.querySelectorAll("[data-s1]").forEach(b=>b.onclick=()=>{seg1=b.dataset.s1;render();});
  document.querySelectorAll("[data-s2]").forEach(b=>b.onclick=()=>{seg2=b.dataset.s2;render();});
  pinned=false; tip.style.display="none"; bindHovers();
}
fetch('data.json',{cache:'no-store'})
  .then(function(r){ if(!r.ok) throw new Error('no data.json'); return r.json(); })
  .then(function(d){ if(d && d.dates && d.dates.length){ DATA = d; CUR = DATA.dates[0]; } })
  .catch(function(){ /* 尚未產生 data.json：先用內嵌樣本 */ })
  .finally(function(){ render(); });
</script>
</body>
</html>
